name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve version
        id: version
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $version = $tag.TrimStart('v')
          "tag=$tag" >> $env:GITHUB_OUTPUT
          "version=$version" >> $env:GITHUB_OUTPUT
          Write-Host "Building release $tag (version $version)"

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore SubtitleStudio.sln

      - name: Build
        run: dotnet build SubtitleStudio.sln -c Release --no-restore

      - name: Test
        run: dotnet test SubtitleStudio.sln -c Release --no-build --verbosity normal

      - name: Publish portable build
        run: >
          dotnet publish SubtitleStudio.App/SubtitleStudio.App.csproj
          -c Release -r win-x64 --self-contained
          -p:Version=${{ steps.version.outputs.version }}
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          -p:PublishReadyToRun=true
          -o artifacts/publish/win-x64

      - name: Create portable ZIP
        shell: pwsh
        run: |
          $zip = "artifacts/SubtitleStudio-${{ steps.version.outputs.version }}-win-x64.zip"
          if (Test-Path $zip) { Remove-Item $zip -Force }
          Compress-Archive -Path "artifacts/publish/win-x64/*" -DestinationPath $zip
          Write-Host "Created $zip"

      - name: Build MSIX package
        shell: pwsh
        run: >
          ./scripts/build-msix.ps1
          -Configuration Release
          -OutputDir artifacts/msix
          -Version ${{ steps.version.outputs.version }}

      - name: Prepare signing certificate
        id: signing
        shell: pwsh
        env:
          SIGNING_CERTIFICATE_BASE64: ${{ secrets.SIGNING_CERTIFICATE_BASE64 }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:SIGNING_CERTIFICATE_BASE64)) {
            Write-Host "No signing certificate configured — artifacts will be unsigned."
            "enabled=false" >> $env:GITHUB_OUTPUT
          } else {
            ./scripts/prepare-signing-cert.ps1
            "enabled=true" >> $env:GITHUB_OUTPUT
          }

      - name: Sign portable executable
        if: steps.signing.outputs.enabled == 'true'
        shell: pwsh
        env:
          SIGNING_CERTIFICATE_PASSWORD: ${{ secrets.SIGNING_CERTIFICATE_PASSWORD }}
        run: >
          ./scripts/sign-artifact.ps1
          -FilePath artifacts/publish/win-x64/SubtitleStudio.exe

      - name: Sign MSIX package
        if: steps.signing.outputs.enabled == 'true'
        shell: pwsh
        env:
          SIGNING_CERTIFICATE_PASSWORD: ${{ secrets.SIGNING_CERTIFICATE_PASSWORD }}
        run: >
          ./scripts/sign-artifact.ps1
          -FilePath artifacts/msix/SubtitleStudio.msix

      - name: Rename signed MSIX with version
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.version }}"
          Copy-Item artifacts/msix/SubtitleStudio.msix "artifacts/SubtitleStudio-$version-win-x64.msix"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Subtitle Studio ${{ steps.version.outputs.tag }}
          generate_release_notes: true
          files: |
            artifacts/SubtitleStudio-${{ steps.version.outputs.version }}-win-x64.zip
            artifacts/SubtitleStudio-${{ steps.version.outputs.version }}-win-x64.msix
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}